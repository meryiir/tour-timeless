<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/api/seo/sitemap.xml" />
    <title>Mosaic Morocco</title>
    <meta name="description" content="Curated Morocco tours, desert adventures, and hand-picked travel experiences from Marrakech and beyond." />
    <meta name="author" content="Mosaic Morocco" />
    <meta name="theme-color" content="#0f172a" />

    <meta property="og:title" content="Mosaic Morocco — Curated tours &amp; travel experiences" />
    <meta property="og:description" content="Discover Morocco with curated tours, desert trips, and authentic experiences. Book activities and explore destinations." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://morocco-mosaic.com/" />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@MosaicMorocco" />
    <meta name="twitter:image" content="/logo.png" />
  </head>

  <body>
    <div id="root">
      <div id="app-loader" role="status" aria-live="polite" aria-label="Loading">
        <div class="app-loader__card">
          <img class="app-loader__logo" src="/logo.png" alt="Mosaic Morocco" />
          <div class="app-loader__spinner" aria-hidden="true"></div>
          <div class="app-loader__text">Loading…</div>
        </div>
      </div>
    </div>
    <style>
      /* Initial loader: shown before React + CSS bundles load */
      #app-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(1200px 600px at 50% 30%, rgba(212, 184, 144, 0.20), transparent 60%),
          linear-gradient(135deg, #fbf7f2 0%, #f6efe6 100%);
        z-index: 9999;
        transition: opacity 280ms ease, transform 280ms ease;
      }
      #app-loader.app-loader--hide {
        opacity: 0;
        transform: translateY(6px);
        pointer-events: none;
      }
      .app-loader__card {
        width: min(420px, 92vw);
        padding: 28px 22px 22px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.70);
        border: 1px solid rgba(148, 112, 72, 0.18);
        box-shadow: 0 18px 60px rgba(20, 16, 10, 0.10);
        backdrop-filter: blur(10px);
        text-align: center;
      }
      .app-loader__logo {
        width: 56px;
        height: 56px;
        display: block;
        margin: 0 auto 14px;
        border-radius: 14px;
        box-shadow: 0 10px 26px rgba(20, 16, 10, 0.14);
      }
      .app-loader__spinner {
        width: 34px;
        height: 34px;
        margin: 2px auto 12px;
        border-radius: 999px;
        border: 3px solid rgba(148, 112, 72, 0.22);
        border-top-color: rgba(148, 112, 72, 0.90);
        animation: app-loader-spin 900ms linear infinite;
      }
      .app-loader__text {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        font-size: 13px;
        letter-spacing: 0.02em;
        color: rgba(70, 50, 26, 0.80);
      }
      @keyframes app-loader-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-loader { transition: none; }
        .app-loader__spinner { animation: none; }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
